[build]
  publish = "dist"
  command = "npm ci && npm run build --workspace=alacarte-client"
  functions = "netlify/functions"
  node_version = "20"

[functions]
  external_node_modules = ["mongodb", "@supabase/supabase-js"]
  node_bundler = "esbuild"

# Proxy /api/* to the Netlify function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  framework = "#custom"
  command = "npm run dev:netlify"
  targetPort = 5173
  port = 8888
  autoLaunch = true
